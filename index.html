<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoodSync - Music for Every Mood</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-mood="chill">
  <div class="bg-overlay"></div>
  <main class="app">
    <header class="mood-header glass">
      <h1><i data-lucide="music"></i> What's your vibe today?</h1>
      <div class="mood-buttons" aria-label="Choose your mood">
        <button class="mood-btn" data-mood="chill"><i data-lucide="smile"></i> Chill</button>
        <button class="mood-btn" data-mood="hype"><i data-lucide="flame"></i> Hype</button>
        <button class="mood-btn" data-mood="heartbreak"><i data-lucide="heart-crack"></i> Heartbreak</button>
        <button class="mood-btn" data-mood="focus"><i data-lucide="target"></i> Focus</button>
        <button class="mood-btn" data-mood="latenight"><i data-lucide="moon"></i> Late Night</button>
      </div>
      <p id="moodQuote" class="mood-quote"></p>
    </header>

    <section class="player-section glass">
      <div class="album-wrap">
        <img id="albumArt" src="images/placeholder-cover.svg" alt="Album artwork" />
      </div>
      <h2 id="songTitle">Select a mood to start</h2>
      <p id="artistName">MoodSync</p>

      <audio id="audioPlayer"></audio>

      <div class="visualizer-box">
        <canvas id="visualizer" width="900" height="120" aria-label="Audio visualizer"></canvas>
      </div>

      <div class="controls">
        <button id="shuffleBtn" class="control-btn" aria-label="Shuffle"><i data-lucide="shuffle"></i></button>
        <button id="prevBtn" class="control-btn" aria-label="Previous"><i data-lucide="skip-back"></i></button>
        <button id="playBtn" class="control-btn play-btn" aria-label="Play"><i data-lucide="play"></i></button>
        <button id="pauseBtn" class="control-btn" aria-label="Pause"><i data-lucide="pause"></i></button>
        <button id="nextBtn" class="control-btn" aria-label="Next"><i data-lucide="skip-forward"></i></button>
        <button id="repeatBtn" class="control-btn" aria-label="Repeat"><i data-lucide="repeat"></i></button>
      </div>

      <div class="progress-wrap">
        <span id="currentTime">0:00</span>
        <input id="progressBar" type="range" min="0" max="100" value="0" aria-label="Seek" />
        <span id="totalDuration">0:00</span>
      </div>

      <div class="volume-wrap">
        <label for="volumeSlider"><i data-lucide="volume-2"></i></label>
        <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.8" />
      </div>
    </section>

    <section class="playlist-section glass">
      <h3 id="playlistTitle"><i data-lucide="music"></i> Playlist</h3>
      <ul id="playlist" class="playlist"></ul>
    </section>
  </main>

  <aside id="miniPlayer" class="mini-player glass">
    <img id="miniArt" src="images/placeholder-cover.svg" alt="Mini player album art" />
    <div class="mini-info">
      <strong id="miniTitle">No track playing</strong>
    </div>
    <button id="miniPlayPauseBtn" class="control-btn" aria-label="Play or Pause"><i data-lucide="play"></i></button>
    <button id="miniNextBtn" class="control-btn" aria-label="Next"><i data-lucide="skip-forward"></i></button>
  </aside>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="script.js"></script>
</body>
</html>
